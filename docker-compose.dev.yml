# Dev-only stack so you can verify the saga locally BEFORE writing K8s manifests.
# NOT graded. Replace with a Helm chart (and Strimzi-managed Kafka) for submission.
#
# Single-broker Apache Kafka in KRaft mode (no Zookeeper). Topics auto-create on
# first publish — DO NOT rely on this in your K8s submission; pre-create with
# KafkaTopic CRDs there.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# Then in another shell:
#   curl -X POST localhost:8001/signup -H 'content-type: application/json' \
#        -d '{"phone":"+237600","password":"hunter22","role":"citizen"}'
#   TOKEN=...(copy from previous response)
#   curl -X POST localhost:8002/sos -H "authorization: Bearer $TOKEN" \
#        -H 'content-type: application/json' \
#        -d '{"lat":4.0500,"lon":9.7700,"mode":"online"}'
#   docker compose -f docker-compose.dev.yml logs -f notification-service
#   curl localhost:8005/stats/events
#
# Inspect topics / messages:
#   docker compose -f docker-compose.dev.yml exec kafka \
#     /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
#   docker compose -f docker-compose.dev.yml exec kafka \
#     /opt/kafka/bin/kafka-console-consumer.sh --bootstrap-server localhost:9092 \
#     --topic sos.triggered --from-beginning

services:
  kafka:
    image: apache/kafka:3.7.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      retries: 12

  user-service:
    build:
      context: ./services/user-service
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY app ./app
        ENV PYTHONUNBUFFERED=1
        CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DB_PATH: /data/user.db
      JWT_SECRET: dev-only
      SERVICE_PORT: "8001"
    ports: ["8001:8001"]
    volumes: ["user-data:/data"]
    depends_on: { kafka: { condition: service_healthy } }

  sos-service:
    build:
      context: ./services/sos-service
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY app ./app
        ENV PYTHONUNBUFFERED=1
        CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DB_PATH: /data/sos.db
      JWT_SECRET: dev-only
      SERVICE_PORT: "8002"
    ports: ["8002:8002"]
    volumes: ["sos-data:/data"]
    depends_on: { kafka: { condition: service_healthy } }

  dispatch-service:
    build:
      context: ./services/dispatch-service
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY app ./app
        ENV PYTHONUNBUFFERED=1
        CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8003"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DB_PATH: /data/dispatch.db
      MATCHER: nearest
      SERVICE_PORT: "8003"
    ports: ["8003:8003"]
    volumes: ["dispatch-data:/data"]
    depends_on: { kafka: { condition: service_healthy } }

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY app ./app
        ENV PYTHONUNBUFFERED=1
        CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8004"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DB_PATH: /data/notification.db
      SERVICE_PORT: "8004"
    ports: ["8004:8004"]
    volumes: ["notification-data:/data"]
    depends_on: { kafka: { condition: service_healthy } }

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY app ./app
        ENV PYTHONUNBUFFERED=1
        CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8005"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DB_PATH: /data/analytics.db
      SERVICE_PORT: "8005"
    ports: ["8005:8005"]
    volumes: ["analytics-data:/data"]
    depends_on: { kafka: { condition: service_healthy } }

volumes:
  user-data: {}
  sos-data: {}
  dispatch-data: {}
  notification-data: {}
  analytics-data: {}
