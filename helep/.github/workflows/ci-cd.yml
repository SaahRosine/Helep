name: HELEP CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/helep

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on all services
        run: |
          flake8 services/user-service/app/ \
                 services/sos-service/app/ \
                 services/dispatch-service/app/ \
                 services/notification-service/app/ \
                 services/analytics-service/app/ \
                 --max-line-length=120 --ignore=E501

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: user-service
            port: 8001
          - name: sos-service
            port: 8002
          - name: dispatch-service
            port: 8003
          - name: notification-service
            port: 8004
          - name: analytics-service
            port: 8005
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service.name }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ github.sha }}

  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: Update Helm dependencies
        run: helm dependency update helm/

      - name: Deploy HELEP umbrella chart
        run: |
          helm upgrade --install helep helm/ \
            --namespace helep \
            --create-namespace \
            --set global.jwtSecret="${{ secrets.JWT_SECRET }}" \
            --set "sos-service.image.tag=${{ github.sha }}" \
            --set "user-service.image.tag=${{ github.sha }}" \
            --set "dispatch-service.image.tag=${{ github.sha }}" \
            --set "notification-service.image.tag=${{ github.sha }}" \
            --set "analytics-service.image.tag=${{ github.sha }}" \
            --wait --timeout=5m
        env:
          KUBECONFIG: kubeconfig.yaml
