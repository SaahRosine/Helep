apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dispatch
spec:
  selector:
    app: dispatch-service
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dispatch-config
data:
  KAFKA_BOOTSTRAP: {{ .Values.global.kafka.bootstrap | quote }}
  MATCHER: {{ .Values.matcher | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-dispatch-secret
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.global.jwtSecret | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-dispatch-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-dispatch-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-dispatch
  minReplicas: {{ .Values.replicaCount }}
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
