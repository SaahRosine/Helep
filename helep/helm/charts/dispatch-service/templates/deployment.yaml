apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dispatch
  labels:
    app: dispatch-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: dispatch-service
  template:
    metadata:
      labels:
        app: dispatch-service
    spec:
      containers:
        - name: dispatch-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: KAFKA_BOOTSTRAP
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-dispatch-config
                  key: KAFKA_BOOTSTRAP
            - name: MATCHER
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-dispatch-config
                  key: MATCHER
            - name: SERVICE_PORT
              value: "{{ .Values.port }}"
            - name: DB_PATH
              value: "/data/dispatch.db"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-dispatch-secret
                  key: JWT_SECRET
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-dispatch-pvc
